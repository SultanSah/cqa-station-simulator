<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CQA-Godhead | 算力网络推演系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cqa: {
                            blue: '#0ea5e9',
                            dark: '#0f172a',
                            panel: '#1e293b',
                            accent: '#38bdf8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 定制高级滑块样式 */
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent; margin: 10px 0;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; cursor: pointer;
            background: #334155; border-radius: 9999px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 20px; width: 20px; border-radius: 50%;
            background: #0ea5e9; cursor: pointer;
            -webkit-appearance: none; margin-top: -7px;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.5);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        
        /* 数字跳动动画 */
        .number-transition { transition: all 0.3s ease-out; }
    </style>
</head>
<body class="bg-cqa-dark text-slate-200 font-sans antialiased p-4 md:p-8 min-h-screen flex items-center justify-center">

<div class="max-w-5xl w-full bg-cqa-panel rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
    <div class="bg-slate-800/50 p-6 border-b border-slate-700 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-wider">CERULEON QUANTUM ASTRAL</h1>
            <p class="text-slate-400 text-sm mt-1">「超充之城」多模态算力集群推演模拟器 V2.0</p>
        </div>
        <div class="px-3 py-1 bg-cqa-blue/20 text-cqa-accent rounded-full text-xs font-semibold border border-cqa-blue/30">
            System Online
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-12 gap-0">
        <div class="col-span-1 md:col-span-7 p-6 border-r border-slate-700 space-y-8">
            
            <div>
                <div class="flex justify-between items-end mb-2">
                    <label class="font-medium text-slate-300">大型主站部署数量</label>
                    <span class="text-3xl font-bold text-cqa-accent" id="mainVal">100</span>
                </div>
                <input type="range" id="mainStations" min="0" max="200" value="100" oninput="updateUI()">
                <div class="flex justify-between text-xs text-slate-500 mt-1">
                    <span>0</span><span>200</span>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-end mb-2">
                    <label class="font-medium text-slate-300">边缘分站部署数量</label>
                    <span class="text-3xl font-bold text-cqa-accent" id="subVal">500</span>
                </div>
                <input type="range" id="subStations" min="0" max="1000" value="500" oninput="updateUI()">
                <div class="flex justify-between text-xs text-slate-500 mt-1">
                    <span>0</span><span>1000</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="font-medium text-slate-300 block mb-3">底层算力架构</label>
                    <div class="space-y-2">
                        <label class="flex items-center space-x-3 p-3 bg-slate-800 rounded-lg border border-slate-700 cursor-pointer hover:border-cqa-blue transition-colors">
                            <input type="radio" name="hardware" value="B200" checked onchange="updateUI()" class="form-radio text-cqa-blue bg-slate-900 border-slate-600 focus:ring-cqa-blue focus:ring-offset-slate-800 h-4 w-4">
                            <span class="text-sm font-medium text-slate-200">Blackwell B200</span>
                        </label>
                        <label class="flex items-center space-x-3 p-3 bg-slate-800 rounded-lg border border-slate-700 cursor-pointer hover:border-cqa-blue transition-colors">
                            <input type="radio" name="hardware" value="H200" onchange="updateUI()" class="form-radio text-cqa-blue bg-slate-900 border-slate-600 focus:ring-cqa-blue focus:ring-offset-slate-800 h-4 w-4">
                            <span class="text-sm font-medium text-slate-200">Hopper H200</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="font-medium text-slate-300 block mb-3">能源单价设定</label>
                    <div class="relative">
                        <input type="number" id="powerCost" value="0.8" step="0.1" oninput="updateUI()" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-cqa-blue focus:ring-1 focus:ring-cqa-blue transition-colors">
                        <span class="absolute right-4 top-3 text-slate-500 font-medium">¥ / kWh</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-span-1 md:col-span-5 bg-slate-900/50 p-6 flex flex-col justify-center space-y-8">
            
            <div class="bg-slate-800/80 rounded-xl p-5 border border-slate-700 shadow-inner">
                <p class="text-slate-400 text-sm font-medium mb-1">全网总规划算力</p>
                <div class="flex items-baseline space-x-2">
                    <span id="totalFlops" class="text-5xl font-black text-white number-transition">35000</span>
                    <span class="text-cqa-accent font-semibold">P (FLOPs)</span>
                </div>
            </div>

            <div class="bg-slate-800/80 rounded-xl p-5 border border-slate-700 shadow-inner">
                <p class="text-slate-400 text-sm font-medium mb-1">硬件 CAPEX 预估</p>
                <div class="flex items-baseline space-x-2">
                    <span id="totalCost" class="text-4xl font-bold text-white number-transition">28.80</span>
                    <span class="text-slate-300 font-medium">亿 RMB</span>
                </div>
            </div>

            <div class="bg-slate-800/80 rounded-xl p-5 border border-slate-700 shadow-inner">
                <p class="text-slate-400 text-sm font-medium mb-1">日均 OPEX (电力成本)</p>
                <div class="flex items-baseline space-x-2">
                    <span id="dailyPowerCost" class="text-4xl font-bold text-white number-transition">10.56</span>
                    <span class="text-slate-300 font-medium">万元 / 天</span>
                </div>
            </div>

            <div class="text-xs text-slate-500 border-t border-slate-700 pt-4">
                单节点推演基准：主站 <span id="pMainP" class="text-slate-300">100</span>P / 分站 <span id="pSubP" class="text-slate-300">50</span>P
            </div>
        </div>
    </div>
</div>

<script>
    const hardwareConfig = {
        'B200': { mainP: 100, subP: 50, mainCost: 1145, subCost: 347, mainPowerDaily: 360, subPowerDaily: 192 },
        'H200': { mainP: 40, subP: 20, mainCost: 450, subCost: 150, mainPowerDaily: 240, subPowerDaily: 120 }
    };

    function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = (progress * (end - start) + start).toFixed(obj.id === 'totalFlops' ? 0 : 2);
            if (progress < 1) { window.requestAnimationFrame(step); }
        };
        window.requestAnimationFrame(step);
    }

    let lastFlops = 0, lastCost = 0, lastPower = 0;

    function updateUI() {
        const mainCount = parseInt(document.getElementById('mainStations').value);
        const subCount = parseInt(document.getElementById('subStations').value);
        const powerRate = parseFloat(document.getElementById('powerCost').value) || 0;
        const hwType = document.querySelector('input[name="hardware"]:checked').value;
        const config = hardwareConfig[hwType];

        document.getElementById('mainVal').innerText = mainCount;
        document.getElementById('subVal').innerText = subCount;
        document.getElementById('pMainP').innerText = config.mainP;
        document.getElementById('pSubP').innerText = config.subP;

        const totalFlops = (mainCount * config.mainP) + (subCount * config.subP);
        const totalCostYi = ((mainCount * config.mainCost) + (subCount * config.subCost)) / 10000;
        const powerCostDailyW = (((mainCount * config.mainPowerDaily) + (subCount * config.subPowerDaily)) * powerRate) / 10000;

        // 加入数字平滑跳动效果，彻底消除生硬的“静态感”
        animateValue(document.getElementById('totalFlops'), lastFlops, totalFlops, 300);
        animateValue(document.getElementById('totalCost'), lastCost, totalCostYi, 300);
        animateValue(document.getElementById('dailyPowerCost'), lastPower, powerCostDailyW, 300);

        lastFlops = totalFlops; lastCost = totalCostYi; lastPower = powerCostDailyW;
    }
    
    updateUI();
</script>
</body>
</html>
